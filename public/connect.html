<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BlackAngel - Connect WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #050a14;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(3px);
      z-index: -1;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 80px 20px 40px;
    }

    .glass-card {
      background: rgba(10, 20, 40, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 30px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      box-shadow: 0 0 50px rgba(0, 240, 255, 0.1);
      position: relative;
      text-align: center;
    }

    .logo {
      width: 100px;
      margin: 0 auto 20px;
      background: linear-gradient(45deg, #00f0ff, #25d366);
      border-radius: 50%;
      padding: 5px;
      display: inline-block;
      box-shadow: 0 0 30px #00f0ff;
    }

    .ba-letter {
      width: 90px;
      height: 90px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      color: #00f0ff;
      text-shadow: 0 0 20px #00f0ff;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      color: #00f0ff;
      margin-bottom: 5px;
    }

    .badge {
      font-size: 0.7rem;
      background: rgba(0, 240, 255, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      color: #7edcff;
      border: 1px solid #00f0ff;
      display: inline-block;
      margin-bottom: 20px;
    }

    .method-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .method-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 10px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    .method-btn.active {
      background: #00f0ff;
      color: #000;
      border-color: #00f0ff;
    }

    .qr-container {
      background: #fff;
      padding: 15px;
      border-radius: 20px;
      display: inline-block;
      margin: 10px 0;
    }

    canvas, img {
      max-width: 100%;
      border-radius: 10px;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 15px;
      border-radius: 30px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      margin: 10px 0;
    }

    button {
      background: linear-gradient(45deg, #0077ff, #00f0ff);
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .code-display {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      color: #25d366;
      background: rgba(37, 211, 102, 0.1);
      padding: 15px;
      border-radius: 20px;
      border: 1px dashed #25d366;
      margin-top: 15px;
      cursor: pointer;
    }

    .status {
      margin-top: 15px;
      font-size: 0.85rem;
      color: #ffaa44;
    }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 20px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <video class="video-bg" autoplay loop muted playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-red-flames-rising-in-the-dark-32634-large.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="container">
    <div class="glass-card">
      <div class="logo"><div class="ba-letter">BA</div></div>
      <h1>BLACK ANGEL</h1>
      <span class="badge">WHATSAPP PAIRING</span>

      <div class="method-buttons">
        <button class="method-btn active" id="qrMethodBtn">📷 QR CODE</button>
        <button class="method-btn" id="numberMethodBtn">📱 PHONE NUMBER</button>
      </div>

      <!-- QR Method -->
      <div id="qrMethod">
        <div class="qr-container" id="qrContainer">
          <canvas id="qrCanvas" width="250" height="250"></canvas>
        </div>
        <button id="refreshQrBtn">⟳ REFRESH QR</button>
        <div id="qrStatus" class="status">Waiting for QR...</div>
      </div>

      <!-- Phone Number Method -->
      <div id="numberMethod" style="display: none;">
        <input type="tel" id="phoneNumber" placeholder="Your WhatsApp number (e.g., 263712345678)">
        <button id="requestCodeBtn">REQUEST PAIRING CODE</button>
        <div id="pairingCodeDisplay" class="code-display" style="display: none;"></div>
        <div id="numberStatus" class="status"></div>
        <p style="font-size: 0.7rem; margin-top: 10px;">Enter your number with country code (no +). You will receive an 8‑digit code on WhatsApp.</p>
      </div>

      <div class="footer">© 2026 BLACK ANGEL | CRASHER MODULE</div>
    </div>
  </div>

  <script>
    let currentMethod = 'qr';
    let qrRefreshInterval = null;

    // Helper to show/hide methods
    function setMethod(method) {
      currentMethod = method;
      document.getElementById('qrMethod').style.display = method === 'qr' ? 'block' : 'none';
      document.getElementById('numberMethod').style.display = method === 'number' ? 'block' : 'none';
      document.getElementById('qrMethodBtn').classList.toggle('active', method === 'qr');
      document.getElementById('numberMethodBtn').classList.toggle('active', method === 'number');
      if (method === 'qr') {
        fetchQR();
      } else {
        if (qrRefreshInterval) clearInterval(qrRefreshInterval);
      }
    }

    // QR generation using backend
    async function fetchQR() {
      const qrStatus = document.getElementById('qrStatus');
      qrStatus.innerHTML = '<span class="loader"></span> Generating QR...';
      try {
        const res = await fetch('/api/request-qr', { method: 'POST' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data.qr) {
          // Assume backend returns a data URL or raw QR string. We'll use canvas to draw QR if needed.
          // For simplicity, we'll create an img element if data is URL, else use QRCode library.
          if (data.qr.startsWith('data:image')) {
            const img = document.createElement('img');
            img.src = data.qr;
            img.style.width = '250px';
            img.style.height = '250px';
            const container = document.getElementById('qrContainer');
            container.innerHTML = '';
            container.appendChild(img);
          } else {
            // If it's just text, use qrcode library
            const canvas = document.getElementById('qrCanvas');
            if (typeof QRCode !== 'undefined') {
              new QRCode(canvas, { text: data.qr, width: 250, height: 250 });
            } else {
              // Dynamically load QRCode library
              const script = document.createElement('script');
              script.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
              script.onload = () => new QRCode(canvas, { text: data.qr, width: 250, height: 250 });
              document.head.appendChild(script);
            }
          }
          qrStatus.innerHTML = '✅ QR ready. Scan with WhatsApp.';
        } else {
          qrStatus.innerHTML = '⚠️ No QR received. Try again.';
        }
      } catch (err) {
        console.error(err);
        qrStatus.innerHTML = '❌ Failed to fetch QR. Ensure backend is running.';
      }
    }

    // Phone number pairing
    async function requestPairingCode() {
      const phoneNumber = document.getElementById('phoneNumber').value.trim();
      if (!phoneNumber || phoneNumber.length < 8) {
        document.getElementById('numberStatus').innerHTML = '❌ Enter a valid phone number (e.g., 263712345678)';
        return;
      }
      const btn = document.getElementById('requestCodeBtn');
      const statusDiv = document.getElementById('numberStatus');
      btn.disabled = true;
      statusDiv.innerHTML = '<span class="loader"></span> Requesting pairing code...';
      try {
        const res = await fetch('/api/request-pairing-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber })
        });
        const data = await res.json();
        if (data.success && data.code) {
          const code = data.code;
          const displayDiv = document.getElementById('pairingCodeDisplay');
          displayDiv.innerText = code;
          displayDiv.style.display = 'block';
          displayDiv.setAttribute('data-code', code);
          statusDiv.innerHTML = '✅ Code generated. Open WhatsApp → Linked Devices → Link with phone number → enter this code.';
        } else {
          statusDiv.innerHTML = '❌ ' + (data.error || 'Failed to generate code.');
        }
      } catch (err) {
        statusDiv.innerHTML = '❌ Network error. Check backend.';
      } finally {
        btn.disabled = false;
      }
    }

    // Copy code to clipboard
    document.getElementById('pairingCodeDisplay')?.addEventListener('click', function() {
      const code = this.getAttribute('data-code') || this.innerText;
      navigator.clipboard.writeText(code);
      const status = document.getElementById('numberStatus');
      const original = status.innerHTML;
      status.innerHTML = '📋 Code copied!';
      setTimeout(() => { status.innerHTML = original; }, 2000);
    });

    // Event listeners
    document.getElementById('qrMethodBtn').addEventListener('click', () => setMethod('qr'));
    document.getElementById('numberMethodBtn').addEventListener('click', () => setMethod('number'));
    document.getElementById('refreshQrBtn')?.addEventListener('click', fetchQR);
    document.getElementById('requestCodeBtn')?.addEventListener('click', requestPairingCode);

    // Set initial method
    setMethod('qr');
  </script>
</body>
</html>
