<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>DeathNote - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00f0ff;
      --secondary: #7edcff;
      --accent: #25d366;
      --card-bg: rgba(10, 20, 40, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* Fullscreen Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(3px);
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      z-index: 10;
    }

    .glass-box {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 60px 30px 30px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      box-shadow: 0 0 50px rgba(0, 240, 255, 0.1);
      position: relative;
      text-align: center;
    }

    .profile-glow {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 110px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
    }

    .profile-glow img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #000;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .badge {
      font-size: 0.7rem;
      background: rgba(0, 240, 255, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      color: var(--secondary);
      border: 1px solid var(--primary);
      display: inline-block;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 15px;
      border-radius: 15px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(45deg, #0077ff, #00f0ff);
      border: none;
      padding: 15px;
      border-radius: 15px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 240, 255, 0.4);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-card i { color: var(--primary); margin-bottom: 5px; }

    .channel-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      color: #000;
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: 700;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 999;
    }

    .notification.show { transform: translateX(-50%) translateY(0); }

    .error {
      color: #ff6b6b;
      font-size: 0.8rem;
      margin-top: 10px;
    }

    .register-link {
      margin-top: 20px;
      font-size: 0.8rem;
    }
    .register-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <video class="video-bg" autoplay loop muted playsinline>
    <source src="https://files.catbox.moe/lg7gnu.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  
  <div class="notification" id="notif">🔐 Welcome back</div>

  <div class="container">
    <div class="glass-box">
      <div class="profile-glow">
        <img src="https://files.catbox.moe/0jr6y9.jpg" alt="DeathNote Logo">
      </div>
      
      <h1>DEATH NOTE</h1>
      <span class="badge">WEBUG v1.0</span>

      <div class="stats-grid">
        <div class="stat-card">
          <i class="fas fa-server"></i><br>
          Status: <span style="color:var(--accent)">ONLINE</span>
        </div>
        <div class="stat-card">
          <i class="fas fa-bolt"></i><br>
          Latency: <span id="ping">--</span> ms
        </div>
      </div>

      <div class="input-group">
        <input type="text" id="username" placeholder="Username">
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password">
      </div>

      <button class="btn-submit" id="submit">ENTER</button>

      <div id="errorMsg" class="error"></div>

      <div class="register-link">
        No account? <a href="register.html">Create one →</a>
      </div>

      <a href="https://whatsapp.com/channel/0029VbCRVuO3LdQW1Tz2UB2A" target="_blank" class="channel-link">
        <i class="fab fa-whatsapp"></i> JOIN OFFICIAL CHANNEL
      </a>

      <p style="font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-top: 20px;">
        © 2026 DEATHNOTE | POWERED BY ALPHA × DARK
      </p>
    </div>
  </div>

  <script>
    // Simulated ping
    setInterval(() => {
      const pingEl = document.getElementById('ping');
      if (pingEl) pingEl.innerText = Math.floor(Math.random() * 50) + 10;
    }, 3000);

    const submitBtn = document.getElementById('submit');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('errorMsg');
    const notif = document.getElementById('notif');

    submitBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        errorDiv.innerText = '❌ Please fill all fields';
        return;
      }

      errorDiv.innerText = '';
      submitBtn.disabled = true;
      submitBtn.innerText = 'LOGGING...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          notif.innerText = '✅ Login successful! Redirecting...';
          notif.classList.add('show');
          setTimeout(() => {
            window.location.href = data.redirect;
          }, 1000);
        } else {
          errorDiv.innerText = '❌ ' + data.message;
          notif.innerText = '❌ Login failed';
          notif.classList.add('show');
          setTimeout(() => notif.classList.remove('show'), 2000);
        }
      } catch (err) {
        errorDiv.innerText = '❌ Server error';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'ENTER';
      }
    });
  </script>
</body>
</html>
