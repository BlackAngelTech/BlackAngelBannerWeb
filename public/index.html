<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>BlackAngel - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00f0ff;
      --secondary: #7edcff;
      --accent: #25d366;
      --card-bg: rgba(10, 20, 40, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(3px);
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      z-index: 10;
    }

    .glass-box {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 60px 30px 30px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      box-shadow: 0 0 50px rgba(0, 240, 255, 0.1);
      position: relative;
      text-align: center;
    }

    .profile-glow {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 110px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-glow .ba-letter {
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: var(--primary);
      text-shadow: 0 0 20px var(--primary);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .badge {
      font-size: 0.7rem;
      background: rgba(0, 240, 255, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      color: var(--secondary);
      border: 1px solid var(--primary);
      display: inline-block;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 15px;
      padding-right: 45px;
      border-radius: 15px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
    }

    .input-group .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
    }
    .input-group .toggle-password:hover { color: var(--primary); }

    .checkbox-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0;
      font-size: 0.8rem;
    }
    .checkbox-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; }

    .btn-submit {
      width: 100%;
      background: linear-gradient(45deg, #0077ff, #00f0ff);
      border: none;
      padding: 15px;
      border-radius: 15px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.3s;
      position: relative;
    }
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 240, 255, 0.4);
    }
    .btn-submit.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    .btn-submit .spinner {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .btn-submit.loading .spinner { display: block; }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    .social-login {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    .social-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .social-btn:hover { background: var(--primary); color: #000; transform: scale(1.1); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .stat-card i { color: var(--primary); margin-bottom: 5px; }

    .channel-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: var(--accent);
      font-weight: 600;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      color: #000;
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: 700;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .notification.error { background: #ff4444; color: white; }
    .notification.success { background: #25d366; color: white; }
    .notification.show { transform: translateX(-50%) translateY(0); }

    .error-msg { color: #ff6b6b; font-size: 0.7rem; margin-top: 5px; display: none; }
    .register-link { margin-top: 20px; font-size: 0.8rem; }
    .register-link a { color: var(--primary); text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <video class="video-bg" autoplay loop muted playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-red-flames-rising-in-the-dark-32634-large.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  
  <div id="notification" class="notification">🔐 Welcome back</div>

  <div class="container">
    <div class="glass-box">
      <div class="profile-glow"><div class="ba-letter">BA</div></div>
      
      <h1>BLACK ANGEL</h1>
      <span class="badge">ACCESS THE VOID</span>

      <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-server"></i><br>Status: <span style="color:var(--accent)">ONLINE</span></div>
        <div class="stat-card"><i class="fas fa-bolt"></i><br>Latency: <span id="ping">--</span> ms</div>
      </div>

      <div class="input-group">
        <input type="text" id="username" placeholder="Username" autocomplete="off">
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password">
        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
      </div>
      <div class="checkbox-group">
        <label><input type="checkbox" id="rememberMe"> Remember me</label>
        <a href="#" style="color:var(--primary); font-size:0.7rem;">Forgot password?</a>
      </div>

      <button class="btn-submit" id="submit"><span class="spinner"></span> ENTER</button>

      <div class="social-login">
        <div class="social-btn"><i class="fab fa-google"></i></div>
        <div class="social-btn"><i class="fab fa-github"></i></div>
        <div class="social-btn"><i class="fab fa-whatsapp"></i></div>
      </div>

      <div class="register-link">No account? <a href="register.html">Create one →</a></div>

      <a href="https://whatsapp.com/channel/0029VbCRVuO3LdQW1Tz2UB2A" target="_blank" class="channel-link">
        <i class="fab fa-whatsapp"></i> JOIN OFFICIAL CHANNEL
      </a>

      <p style="font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-top: 20px;">
        © 2026 BLACK ANGEL | POWERED BY ALPHA × DARK
      </p>
    </div>
  </div>

  <script>
    // Ping simulation
    setInterval(() => { document.getElementById('ping').innerText = Math.floor(Math.random() * 50) + 10; }, 3000);

    // Password visibility toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('password');
    togglePassword.addEventListener('click', () => {
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      togglePassword.classList.toggle('fa-eye-slash');
    });

    // Remember me
    if (localStorage.getItem('rememberedUsername')) {
      document.getElementById('username').value = localStorage.getItem('rememberedUsername');
      document.getElementById('rememberMe').checked = true;
    }

    const submitBtn = document.getElementById('submit');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const notif = document.getElementById('notification');

    function showNotification(message, type = 'info') {
      notif.innerText = message;
      notif.className = `notification ${type} show`;
      setTimeout(() => notif.classList.remove('show'), 3000);
    }

    submitBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showNotification('❌ Please fill all fields', 'error');
        return;
      }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          if (document.getElementById('rememberMe').checked) {
            localStorage.setItem('rememberedUsername', username);
          } else {
            localStorage.removeItem('rememberedUsername');
          }
          showNotification('✅ Login successful! Redirecting...', 'success');
          setTimeout(() => { window.location.href = data.redirect; }, 1000);
        } else {
          showNotification('❌ ' + data.message, 'error');
        }
      } catch (err) {
        showNotification('❌ Server error', 'error');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
